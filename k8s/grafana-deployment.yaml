apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
data:
  dashboard.json: |
    {
      "dashboard": {
        "id": null,
        "uid": "heart-disease-api",
        "title": "Heart Disease API Monitoring",
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Total Predictions",
            "type": "stat",
            "gridPos": { "h": 6, "w": 6, "x": 0, "y": 0 },
            "targets": [
              {
                "expr": "sum(predictions_total)",
                "legendFormat": "Total"
              }
            ]
          },
          {
            "id": 2,
            "title": "Predictions by Result",
            "type": "timeseries",
            "gridPos": { "h": 8, "w": 12, "x": 6, "y": 0 },
            "targets": [
              {
                "expr": "rate(predictions_total[1m])",
                "legendFormat": "{{result}}"
              }
            ]
          },
          {
            "id": 3,
            "title": "Prediction Latency (p95)",
            "type": "gauge",
            "gridPos": { "h": 6, "w": 6, "x": 0, "y": 6 },
            "targets": [
              {
                "expr": "histogram_quantile(0.95, rate(prediction_latency_seconds_bucket[5m]))",
                "legendFormat": "p95"
              }
            ]
          },
          {
            "id": 4,
            "title": "HTTP Requests Rate",
            "type": "timeseries",
            "gridPos": { "h": 8, "w": 12, "x": 6, "y": 8 },
            "targets": [
              {
                "expr": "rate(http_requests_total[1m])",
                "legendFormat": "{{method}} {{endpoint}} {{status}}"
              }
            ]
          },
          {
            "id": 5,
            "title": "Prediction Latency Histogram",
            "type": "timeseries",
            "gridPos": { "h": 8, "w": 18, "x": 0, "y": 16 },
            "targets": [
              {
                "expr": "rate(prediction_latency_seconds_sum[5m]) / rate(prediction_latency_seconds_count[5m])",
                "legendFormat": "avg latency"
              }
            ]
          }
        ],
        "refresh": "10s",
        "schemaVersion": 38,
        "version": 1
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          volumeMounts:
            - name: grafana-datasource
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: grafana-datasource
          configMap:
            name: grafana-datasource
        - name: grafana-dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
